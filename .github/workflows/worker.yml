name: worker — build binaries & desktop apps

# Builds the headless `hydra-worker` CLI for macOS / Windows / Linux, plus the Tauri desktop
# app bundles. Artifacts are uploaded per-build.
#
# Releases:
#   * Tag push (v*)   -> a normal, permanent GitHub Release for that version (cli binaries via
#                        softprops, desktop bundles via tauri-action).
#   * Push to main    -> a single rolling **edge** prerelease that is overwritten every build,
#                        so the newest binary always lives at a stable download URL:
#                        https://github.com/<owner>/<repo>/releases/download/edge/hydra-worker-<target>

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - '.github/workflows/worker.yml'
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ---- headless CLI binary (worker-cli) ----------------------------------------------------
  cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: endsWith(matrix.target, '-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: worker

      - name: Build hydra-worker
        working-directory: worker
        run: cargo build -p worker-cli --release --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        working-directory: worker
        run: |
          mkdir -p dist
          src="target/${{ matrix.target }}/release/hydra-worker"
          if [ -f "${src}.exe" ]; then
            cp "${src}.exe" "dist/hydra-worker-${{ matrix.target }}.exe"
          else
            cp "${src}" "dist/hydra-worker-${{ matrix.target }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: hydra-worker-${{ matrix.target }}
          path: worker/dist/*
          if-no-files-found: error

      # On a v* tag, also attach the CLI binary to the GitHub Release (alongside the desktop
      # bundles the `desktop` job attaches via tauri-action).
      - name: Attach CLI to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: worker/dist/*

  # ---- Tauri desktop app (worker-app) ------------------------------------------------------
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
          - os: macos-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write   # tauri-action uploads the desktop bundles to the tag's GitHub Release
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf build-essential curl wget file libssl-dev libxdo-dev

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: worker/crates/worker-app

      - name: Build desktop bundles
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: worker/crates/worker-app
          # No signing secrets configured yet -> unsigned bundles. Add per-OS signing later.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('hydra-worker {0}', github.ref_name) || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: hydra-worker-desktop-${{ matrix.os }}
          path: |
            worker/crates/worker-app/target/release/bundle/**
            worker/crates/worker-app/target/*/release/bundle/**
          if-no-files-found: warn

  # ---- release download links (tag releases) ------------------------------------------------
  # After the CLI binaries (softprops) and desktop bundles (tauri-action) are attached, rewrite
  # the release body with a per-OS download table — desktop app (UI) first, CLI below — and
  # keep the auto-generated changelog underneath.
  release-links:
    needs: [cli, desktop]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Write per-OS download links into the release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          base="https://github.com/$REPO/releases/download/$TAG"
          assets=$(gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name')

          row() { # $1=os label, $2=asset name
            echo "| $1 | [\`$2\`]($base/$2) |"
          }

          notes=$(mktemp)
          {
            echo "## Downloads"
            echo
            echo "### Desktop app (UI)"
            echo
            echo "| OS | file |"
            echo "|----|------|"
            while IFS= read -r a; do
              case "$a" in
                *.dmg|*.app.tar.gz)     row "macOS"   "$a" ;;
                *-setup.exe|*.msi)      row "Windows" "$a" ;;
                *.AppImage|*.deb|*.rpm) row "Linux"   "$a" ;;
              esac
            done <<< "$assets"
            echo
            echo "### CLI (\`hydra-worker\`, headless)"
            echo
            echo "| target | file |"
            echo "|--------|------|"
            while IFS= read -r a; do
              case "$a" in
                hydra-worker-aarch64-apple-darwin)     row "macOS arm64"    "$a" ;;
                hydra-worker-x86_64-apple-darwin)      row "macOS x86_64"   "$a" ;;
                hydra-worker-x86_64-pc-windows-msvc.exe) row "Windows x86_64" "$a" ;;
                hydra-worker-x86_64-unknown-linux-gnu)  row "Linux x86_64 (glibc)" "$a" ;;
                hydra-worker-x86_64-unknown-linux-musl) row "Linux x86_64 (musl, static)" "$a" ;;
              esac
            done <<< "$assets"
            echo
            # Keep whatever body the release already has (tauri-action stub or generated
            # notes) below the download tables.
            gh release view "$TAG" --repo "$REPO" --json body --jq '.body'
          } > "$notes"

          gh release edit "$TAG" --repo "$REPO" --notes-file "$notes"
          echo "Release body updated with download links:"
          cat "$notes"

  # ---- rolling "edge" prerelease (every main build) ----------------------------------------
  # Collects all per-target artifacts from this run and publishes them to a single, always-
  # overwritten `edge` prerelease. Skipped for tag pushes (those cut a permanent release above).
  edge-release:
    needs: [cli, desktop]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts into a release dir
        run: |
          mkdir -p edge
          # CLI binaries live directly under each hydra-worker-<target>/ artifact; desktop
          # bundles are nested. Copy every regular file, keeping unique basenames.
          find artifacts -type f \
            \( -name 'hydra-worker-*' -o -name '*.deb' -o -name '*.AppImage' \
               -o -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.msi' \
               -o -name '*.exe' -o -name '*.rpm' \) \
            -exec cp -f {} edge/ \;
          echo "Staged for edge release:"
          ls -la edge

      - name: Compose edge release notes with download links
        run: |
          base="https://github.com/${{ github.repository }}/releases/download/edge"

          row() { echo "| $1 | [\`$2\`]($base/$2) |"; }

          {
            echo "Rolling build of \`hydra-worker\` from the latest \`main\`."
            echo
            echo "* commit: ${{ github.sha }}"
            echo "* built: ${{ github.run_id }} (${{ github.run_number }})"
            echo
            echo "These binaries change on every push to \`main\` and are **not** a stable release —"
            echo "use a \`v*\` tag release for that."
            echo
            echo "## Downloads"
            echo
            echo "### Desktop app (UI)"
            echo
            echo "| OS | file |"
            echo "|----|------|"
            for a in edge/*; do
              a=$(basename "$a")
              case "$a" in
                *.dmg|*.app.tar.gz)     row "macOS"   "$a" ;;
                *-setup.exe|*.msi)      row "Windows" "$a" ;;
                *.AppImage|*.deb|*.rpm) row "Linux"   "$a" ;;
              esac
            done
            echo
            echo "### CLI (\`hydra-worker\`, headless)"
            echo
            echo "| target | file |"
            echo "|--------|------|"
            for a in edge/*; do
              a=$(basename "$a")
              case "$a" in
                hydra-worker-aarch64-apple-darwin)       row "macOS arm64"    "$a" ;;
                hydra-worker-x86_64-apple-darwin)        row "macOS x86_64"   "$a" ;;
                hydra-worker-x86_64-pc-windows-msvc.exe) row "Windows x86_64" "$a" ;;
                hydra-worker-x86_64-unknown-linux-gnu)   row "Linux x86_64 (glibc)" "$a" ;;
                hydra-worker-x86_64-unknown-linux-musl)  row "Linux x86_64 (musl, static)" "$a" ;;
              esac
            done
          } > edge-notes.md
          cat edge-notes.md

      - name: Move the edge tag to this commit
        run: |
          git tag -f edge
          git push -f origin refs/tags/edge

      - name: Publish/replace the edge prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: edge
          name: hydra-worker (edge build)
          prerelease: true
          # Replace the whole asset set each run so stale binaries never linger.
          files: edge/*
          # Auto-generate the changelog from commits/PRs the same way a real release does;
          # GitHub appends it below the build-info body.
          generate_release_notes: true
          # Body (build info + per-OS download links) is composed in the step above so the
          # links always match the exact asset set staged for this run.
          body_path: edge-notes.md
